<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <header class="bg-teal-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Welcome, <span id="student-name-display" class="font-extrabold text-teal-200"></span>!</h1>
            <nav>
                <a href="#" onclick="logout()" class="bg-red-500 hover:bg-red-600 border border-red-600 px-4 py-1.5 rounded-md transition shadow-sm font-semibold">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <section class="bg-white p-6 rounded-xl shadow-md border border-gray-200 md:col-span-1 flex flex-col items-center">
                <div class="h-24 w-24 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center text-4xl font-bold mb-4 shadow-sm">
                    👤
                </div>
                <h2 class="text-xl font-bold text-gray-700 mb-2">Your Profile</h2>
                <div class="w-full mt-4 space-y-3">
                    <p class="text-sm bg-gray-50 border border-gray-100 p-3 rounded"><strong class="block text-gray-400 text-xs uppercase mb-1">Email</strong> <span id="student-email-display" class="font-medium"></span></p>
                    <p class="text-sm bg-gray-50 border border-gray-100 p-3 rounded"><strong class="block text-gray-400 text-xs uppercase mb-1">Student ID</strong> <span id="student-id-display" class="font-medium text-xs break-all"></span></p>
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-md border border-gray-200 md:col-span-2">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Your Enrolled Subjects</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left table-auto border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 uppercase text-xs tracking-wider">
                                <th class="px-6 py-3 border-b">Subject Name</th>
                                <th class="px-6 py-3 border-b">Subject Code</th>
                            </tr>
                        </thead>
                        <tbody id="my-subjects-tbody" class="divide-y divide-gray-200">
                            <!-- Subject rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script>
        function logout() {
            Swal.fire({
                title: 'Logging out...',
                text: 'Are you sure you want to log out?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0f766e',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, log out!'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('studentUser');
                    window.location.href = 'login.html';
                }
            });
        }

        window.onload = () => {
            const userStr = localStorage.getItem('studentUser');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            
            const user = JSON.parse(userStr);
            document.getElementById('student-name-display').innerText = user.name;
            document.getElementById('student-email-display').innerText = user.email;
            document.getElementById('student-id-display').innerText = user.id;

            const tbody = document.getElementById('my-subjects-tbody');
            if (user.subjects && user.subjects.length > 0) {
                user.subjects.forEach(sub => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition";
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${sub.name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span class="bg-teal-100 text-teal-800 px-2 py-1 rounded text-xs font-bold font-mono">${sub.code}</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="2" class="px-6 py-8 text-center text-gray-400 italic">No subjects assigned yet.</td></tr>';
            }
        };
    </script>
</body>
</html>
