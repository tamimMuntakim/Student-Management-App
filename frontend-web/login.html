<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 2rem auto; padding: 2rem; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; }
        .auth-toggle { text-align: center; margin-top: 1rem; cursor: pointer; color: blue; text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1>Student Management Login</h1>
    </header>
    <div class="auth-container">
        <div id="login-section">
            <h2>Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <p class="auth-toggle" onclick="toggleAuth()">Need an account? Register</p>
        </div>

        <div id="register-section" style="display:none;">
            <h2>Register</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="register-name" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="register-password" required>
                </div>
                <button type="submit">Register</button>
            </form>
            <p class="auth-toggle" onclick="toggleAuth()">Already have an account? Login</p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
