<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Student Management System</h1>
        <nav style="margin-top: 1rem;">
            <a href="analytics.html" style="color: white; text-decoration: underline;">View Analytics</a>
            <a href="#" onclick="logout()" style="color: white; text-decoration: underline; margin-left: 1rem;">Logout</a>
        </nav>
    </header>

    <main class="container">
        
        <div class="forms-wrapper">
            <!-- Add Student Form -->
            <section class="card">
                <h2>Add Student</h2>
                <form id="add-student-form">
                    <div class="form-group">
                        <label for="student-name">Name:</label>
                        <input type="text" id="student-name" required>
                    </div>
                    <div class="form-group">
                        <label for="student-email">Email:</label>
                        <input type="email" id="student-email" required>
                    </div>
                    <button type="submit">Save Student</button>
                </form>
            </section>

            <!-- Add Subject Form -->
            <section class="card">
                <h2>Add Subject</h2>
                <form id="add-subject-form">
                    <div class="form-group">
                        <label for="subject-name">Subject Name:</label>
                        <input type="text" id="subject-name" required>
                    </div>
                    <div class="form-group">
                        <label for="subject-code">Subject Code:</label>
                        <input type="text" id="subject-code" required>
                    </div>
                    <button type="submit">Save Subject</button>
                </form>
            </section>

            <!-- Assign Subject Form -->
            <section class="card">
                <h2>Assign Subject to Student</h2>
                <form id="assign-subject-form">
                    <div class="form-group">
                        <label for="select-student">Student:</label>
                        <select id="select-student" required>
                            <option value="">-- Select Student --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="select-subject">Subject:</label>
                        <select id="select-subject" required>
                            <option value="">-- Select Subject --</option>
                        </select>
                    </div>
                    <button type="submit">Assign</button>
                </form>
            </section>
        </div>

        <div class="data-wrapper">
            <!-- Students List -->
            <section class="card">
                <h2>Students List</h2>
                <table id="students-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Subjects</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Student rows will be injected here -->
                    </tbody>
                </table>
            </section>

            <!-- Subjects List -->
            <section class="card">
                <h2>Subjects List</h2>
                <table id="subjects-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Code</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Subject rows will be injected here -->
                    </tbody>
                </table>
            </section>

            <!-- Assignments List -->
            <section class="card">
                <h2>Assigned Subjects</h2>
                <table id="assignments-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Subject Name</th>
                            <th>Subject Code</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Assignment rows will be injected here -->
                    </tbody>
                </table>
            </section>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
