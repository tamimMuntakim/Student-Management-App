<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Student Management App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-row-hover:hover { background-color: #ecf5ff; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen flex flex-col">

    <header class="bg-teal-700 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tight">Admin Dashboard</h1>
            <nav class="flex space-x-6 items-center">
                <a href="analytics.html" class="hover:text-teal-200 transition font-medium">View Analytics</a>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 border border-red-600 px-4 py-1.5 rounded transition shadow-sm font-semibold">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <!-- Add Student Form -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-700 mb-4 border-b pb-2">Add Student</h2>
                <form id="add-student-form" class="space-y-4">
                    <div>
                        <label for="student-name" class="block text-sm font-medium text-gray-600 mb-1">Name</label>
                        <input type="text" id="student-name" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-teal-500 focus:border-teal-500 text-sm">
                    </div>
                    <div>
                        <label for="student-email" class="block text-sm font-medium text-gray-600 mb-1">Email</label>
                        <input type="email" id="student-email" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-teal-500 focus:border-teal-500 text-sm">
                    </div>
                    <button type="submit" class="w-full bg-teal-600 text-white font-semibold py-2 rounded hover:bg-teal-700 transition text-sm shadow-sm">Save Student</button>
                </form>
            </section>

            <!-- Add Subject Form -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-700 mb-4 border-b pb-2">Add Subject</h2>
                <form id="add-subject-form" class="space-y-4">
                    <div>
                        <label for="subject-name" class="block text-sm font-medium text-gray-600 mb-1">Subject Name</label>
                        <input type="text" id="subject-name" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-teal-500 focus:border-teal-500 text-sm">
                    </div>
                    <div>
                        <label for="subject-code" class="block text-sm font-medium text-gray-600 mb-1">Subject Code</label>
                        <input type="text" id="subject-code" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-teal-500 focus:border-teal-500 text-sm">
                    </div>
                    <button type="submit" class="w-full bg-teal-600 text-white font-semibold py-2 rounded hover:bg-teal-700 transition text-sm shadow-sm">Save Subject</button>
                </form>
            </section>

            <!-- Assign Subject Form -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-700 mb-4 border-b pb-2">Assign Subject</h2>
                <form id="assign-subject-form" class="space-y-4">
                    <div>
                        <label for="select-student" class="block text-sm font-medium text-gray-600 mb-1">Student</label>
                        <select id="select-student" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-teal-500 focus:border-teal-500 text-sm bg-white">
                            <option value="">-- Select Student --</option>
                        </select>
                    </div>
                    <div>
                        <label for="select-subject" class="block text-sm font-medium text-gray-600 mb-1">Subject</label>
                        <select id="select-subject" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-teal-500 focus:border-teal-500 text-sm bg-white">
                            <option value="">-- Select Subject --</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-teal-600 text-white font-semibold py-2 rounded hover:bg-teal-700 transition text-sm shadow-sm">Assign</button>
                </form>
            </section>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <!-- Students List -->
            <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-700">Students List</h2>
                </div>
                <div class="overflow-x-auto">
                    <table id="students-table" class="min-w-full text-left table-auto">
                        <thead class="bg-white text-gray-500 text-xs uppercase tracking-wider border-b">
                            <tr>
                                <th class="px-6 py-3 font-medium">Name</th>
                                <th class="px-6 py-3 font-medium">Email</th>
                                <th class="px-6 py-3 font-medium">Subjects</th>
                                <th class="px-6 py-3 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm text-gray-700">
                            <!-- Student rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Subjects List -->
                <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                        <h2 class="text-lg font-bold text-gray-700">Subjects List</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table id="subjects-table" class="min-w-full text-left table-auto">
                            <thead class="bg-white text-gray-500 text-xs uppercase tracking-wider border-b">
                                <tr>
                                    <th class="px-6 py-3 font-medium">ID</th>
                                    <th class="px-6 py-3 font-medium">Name</th>
                                    <th class="px-6 py-3 font-medium">Code</th>
                                    <th class="px-6 py-3 font-medium text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm text-gray-700">
                                <!-- Subject rows injected here -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Assignments List -->
                <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                        <h2 class="text-lg font-bold text-gray-700">Assigned Subjects Log</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table id="assignments-table" class="min-w-full text-left table-auto">
                            <thead class="bg-white text-gray-500 text-xs uppercase tracking-wider border-b">
                                <tr>
                                    <th class="px-6 py-3 font-medium">Student Name</th>
                                    <th class="px-6 py-3 font-medium">Subject Name</th>
                                    <th class="px-6 py-3 font-medium">Subject Code</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm text-gray-700">
                                <!-- Assignment rows injected here -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
