<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App - Analytics</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Student-Subject Analytics</h1>
        <nav style="margin-top: 1rem;">
            <a href="index.html" style="color: white; text-decoration: underline;">Back to Dashboard</a>
        </nav>
    </header>

    <div class="container" style="display: block;">
        
        <div class="card" style="margin-bottom: 2rem;">
            <h2>Students and their Courses</h2>
            <table id="student-courses-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Email</th>
                        <th>Enrolled Courses</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Courses and Enrolled Students</h2>
            <table id="course-students-table">
                <thead>
                    <tr>
                        <th>Course Code</th>
                        <th>Course Name</th>
                        <th>Enrolled Students</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>

    </div>

    <script src="js/analytics.js"></script>
</body>
</html>
